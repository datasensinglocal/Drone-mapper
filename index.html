<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Point Code Cross-Section</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  :root{
    --bg:#0f1512; --panel:#16201b; --panel2:#1c2921; --line:#2a3b31;
    --ink:#e9f2ec; --ink-dim:#9db3a6; --accent:#5fbf8a; --accent2:#e0a458;
    --danger:#d9695a; --mono:'SF Mono',Consolas,monospace;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;}
  #app{display:flex;height:100vh;}
  #map{flex:1;background:#0a0e0b;}
  #panel{width:320px;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;}
  .ph{padding:14px 16px;border-bottom:1px solid var(--line);}
  .ph h1{font-size:15px;margin:0 0 2px;letter-spacing:.02em;}
  .ph p{margin:0;font-size:11.5px;color:var(--ink-dim);}
  .sec{padding:12px 16px;border-bottom:1px solid var(--line);}
  .sec h2{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-dim);margin:0 0 8px;}
  button{font-family:inherit;font-size:12px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);
    padding:9px 10px;border-radius:6px;cursor:pointer;text-align:left;transition:.12s;width:100%;}
  button:hover{border-color:var(--accent);}
  button.active{background:var(--accent);color:#08130d;border-color:var(--accent);font-weight:600;}
  button.danger:hover{border-color:var(--danger);}
  .filebtn{display:block;width:100%;}
  input[type=file]{display:none;}
  select,input[type=text]{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    padding:7px 8px;border-radius:6px;font-size:12px;font-family:inherit;}
  .row{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
  .row label{font-size:11px;color:var(--ink-dim);width:100px;flex-shrink:0;}
  .row input{width:70px;flex:none;}
  #log{flex:1;min-height:220px;overflow-y:auto;padding:10px 16px;font-family:var(--mono);font-size:11px;}
  .entry{background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:8px 10px;margin-bottom:6px;}
  .entry .k{color:var(--accent);font-weight:600;}
  .entry .w{color:var(--accent2);}
  .entry .del{float:right;color:var(--danger);cursor:pointer;font-size:10px;}
  .hint{font-size:11px;color:var(--ink-dim);line-height:1.5;margin-top:6px;}
  .badge{display:inline-block;background:var(--accent);color:#08130d;font-size:10px;font-weight:700;
    padding:1px 6px;border-radius:4px;margin-left:4px;}
  .foot{padding:10px 16px;border-top:1px solid var(--line);display:flex;gap:6px;}
  .foot button{flex:1;text-align:center;}
  .leaflet-container{background:#0a0e0b;}
  .dim-label{background:transparent!important;border:none!important;box-shadow:none!important;padding:0!important;
    color:#fff;font-weight:700;font-size:12.5px;font-family:'Segoe UI',system-ui,sans-serif;
    text-shadow:-1.5px -1.5px 2px #000,1.5px -1.5px 2px #000,-1.5px 1.5px 2px #000,1.5px 1.5px 2px #000,0 0 4px #000;
    pointer-events:none;}
  .dim-label::before{display:none!important;}
  .pc-label{background:transparent!important;border:none!important;box-shadow:none!important;padding:0!important;
    color:#e0453a;font-weight:700;font-size:12px;font-family:'Segoe UI',system-ui,sans-serif;
    text-shadow:-1px -1px 2px #fff,1px -1px 2px #fff,-1px 1px 2px #fff,1px 1px 2px #fff;pointer-events:none;}
  .pc-label::before{display:none!important;}
  .pc-tick-hit{position:absolute;left:50%;top:50%;width:22px;height:22px;margin-left:-11px;margin-top:-11px;border-radius:50%;cursor:grab;}
  .pc-tick-hit:active{cursor:grabbing;}
  .pc-tick-bar{position:absolute;left:50%;top:50%;width:4px;height:24px;margin-left:-2px;margin-top:-12px;
    border:1px solid #000;border-radius:2px;box-shadow:0 0 3px rgba(0,0,0,.7);pointer-events:none;}
  .pc-rotate-hit{width:26px;height:26px;border-radius:50%;background:#7ab8e0;border:2px solid #000;
    box-shadow:0 0 4px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;
    cursor:grab;}
  .pc-rotate-hit:active{cursor:grabbing;}
  .pc-action-hit{width:26px;height:26px;border-radius:6px;background:#fff;border:2px solid #000;
    box-shadow:0 0 4px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;
    font-size:13px;cursor:pointer;}
  .pc-list-item{display:flex;align-items:center;justify-content:space-between;gap:6px;
    padding:6px 8px;border:1px solid var(--line);border-radius:5px;margin-bottom:4px;
    font-size:11.5px;cursor:pointer;background:var(--panel2);}
  .pc-list-item:hover{border-color:var(--accent);}
  .pc-list-item.done{opacity:0.55;}
  .pc-list-item .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .pc-list-item .code{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
</style>
</head>
<body>
<div id="app">
  <div id="map"></div>
  <div id="panel">
    <div class="ph">
      <h1>Point Code Cross-Section</h1>
      <p>Click a point code, drag its 4 edges to fit — auto-saves</p>
    </div>

    <div class="sec">
      <h2>Find a point code</h2>
      <div class="row" style="margin-bottom:0;">
        <input type="text" id="searchInput" list="pcCodeOptions" placeholder="Type a point code…" style="flex:1;" onkeydown="if(event.key==='Enter') searchGo();"/>
        <button style="width:auto;padding:8px 12px;" onclick="searchGo()">Go</button>
      </div>
      <datalist id="pcCodeOptions"></datalist>
    </div>

    <div class="sec">
      <h2>Basemap</h2>
      <div class="row"><label>Layer</label>
        <select id="baseSelect" style="width:auto;flex:1;">
          <option value="osm">OSM</option>
          <option value="sat">Esri Satellite</option>
          <option value="wms">BBMP WMS overlay</option>
        </select>
      </div>
    </div>

    <div class="sec">
      <h2>Road network (required)</h2>
      <label class="filebtn"><button onclick="document.getElementById('geojsonInput').click()">Upload GeoJSON or KML</button></label>
      <input type="file" id="geojsonInput" accept=".geojson,.json,.kml"/>
    </div>

    <div class="sec">
      <h2>Point code list (optional)</h2>
      <label class="filebtn"><button onclick="document.getElementById('pcListInput').click()">Upload point codes (GeoJSON or KML)</button></label>
      <input type="file" id="pcListInput" accept=".geojson,.json,.kml"/>
      <div id="pcListContainer" style="display:none;margin-top:8px;">
        <div class="row"><label style="width:auto;">Codes</label><span class="badge" id="pcListStatus">0/0</span></div>
        <div id="pcList" style="max-height:180px;overflow-y:auto;"></div>
      </div>
    </div>

    <div class="sec">
      <h2>Point codes</h2>
      <button id="mode-pc" onclick="toggleMode()">Add point code</button>
      <div class="row" style="margin-top:10px;"><label>Guide length</label>
        <input type="text" id="guideLen" value="30"/><span style="font-size:11px;color:var(--ink-dim);">m</span>
      </div>
      <div class="hint" id="pcHint"></div>
    </div>

    <div class="sec">
      <h2>Image capture buffer</h2>
      <div class="row"><label>Buffer</label>
        <input type="text" id="imgBuffer" value="25"/><span style="font-size:11px;color:var(--ink-dim);">m each side</span>
      </div>
      <div class="hint" id="captureAllStatus"></div>
    </div>

    <div class="sec">
      <details>
        <summary style="cursor:pointer;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-dim);">Google Sheet + Drive sync (advanced)</summary>
        <input type="text" id="sheetSyncUrl" value="https://script.google.com/macros/s/AKfycbyZBY1zjUQDiziVfF-Rxn_V8gc5n-HP83uAxLALf2TUhp-gm63g4c4B5ukyw8vsFNTB/exec" style="margin:8px 0 6px;"/>
        <button onclick="syncAllToSheet()">Re-sync all saved point codes (fallback)</button>
        <div class="hint" id="sheetSyncStatus"></div>
      </details>
    </div>

    <div class="sec">
      <h2>Saved <span class="badge" id="savedCount">0</span></h2>
      <button class="danger" onclick="clearAllSaved()">Clear all saved point codes</button>
    </div>

    <div id="log"></div>

    <div class="foot">
      <button onclick="exportData('geojson')">GeoJSON</button>
      <button onclick="exportData('csv')">CSV</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const WMS_URL   = 'https://rdgis.karnataka.gov.in/geoserver/wms';
const WMS_LAYER = 'BU_bbmp_U:BU_bbmp_U';

const map = L.map('map', {zoomControl:true}).setView([13.0067, 77.5978], 17);

const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:22, maxNativeZoom:19, attribution:'OSM', crossOrigin:true}).addTo(map);
const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {maxZoom:22, maxNativeZoom:19, attribution:'Esri', crossOrigin:true});
const wms = L.tileLayer.wms(WMS_URL, {layers: WMS_LAYER, format:'image/png', transparent:true, version:'1.1.1', maxZoom:22, crossOrigin:true});
let activeBaseLayer = osm;

document.getElementById('baseSelect').addEventListener('change', e=>{
  [osm,sat,wms].forEach(l=>map.removeLayer(l));
  if(e.target.value==='osm'){ osm.addTo(map); activeBaseLayer = osm; }
  if(e.target.value==='sat'){ sat.addTo(map); activeBaseLayer = sat; }
  if(e.target.value==='wms'){ wms.addTo(map); activeBaseLayer = wms; }
});

// ---- KML -> GeoJSON (minimal, handles BBMP-style exports) ----
function kmlToGeoJSON(kmlText){
  const xml = new DOMParser().parseFromString(kmlText, 'text/xml');
  const err = xml.querySelector('parsererror');
  if(err) throw new Error('XML parse error: ' + err.textContent.slice(0,200));
  function parseCoords(text){
    return text.trim().split(/\s+/).map(pair=>{
      const parts = pair.split(',').map(Number);
      return parts.length >= 3 ? [parts[0], parts[1], parts[2]] : [parts[0], parts[1]];
    });
  }
  function geomFromEl(el){
    const tag = el.tagName;
    if(tag === 'LineString'){ const c = el.querySelector('coordinates'); return c ? {type:'LineString', coordinates: parseCoords(c.textContent)} : null; }
    if(tag === 'Point'){ const c = el.querySelector('coordinates'); return c ? {type:'Point', coordinates: parseCoords(c.textContent)[0]} : null; }
    if(tag === 'Polygon'){
      const outer = el.querySelector('outerBoundaryIs LinearRing coordinates');
      if(!outer) return null;
      const rings = [parseCoords(outer.textContent)];
      el.querySelectorAll('innerBoundaryIs LinearRing coordinates').forEach(ic=>rings.push(parseCoords(ic.textContent)));
      return {type:'Polygon', coordinates: rings};
    }
    if(tag === 'MultiGeometry'){
      const geoms = Array.from(el.children).map(geomFromEl).filter(Boolean);
      if(geoms.length===0) return null;
      if(geoms.every(g=>g.type==='LineString')) return {type:'MultiLineString', coordinates: geoms.map(g=>g.coordinates)};
      return {type:'GeometryCollection', geometries: geoms};
    }
    return null;
  }
  const features = [];
  xml.querySelectorAll('Placemark').forEach(pm=>{
    const props = {};
    const nameEl = pm.querySelector(':scope > name');
    if(nameEl) props.name = nameEl.textContent;
    pm.querySelectorAll('SimpleData').forEach(sd=>{ props[sd.getAttribute('name')] = sd.textContent; });
    const geomEl = pm.querySelector('LineString, Point, Polygon, MultiGeometry');
    if(!geomEl) return;
    const geometry = geomFromEl(geomEl);
    if(!geometry) return;
    features.push({type:'Feature', properties: props, geometry});
  });
  return {type:'FeatureCollection', features};
}

let roadLayer = null;
document.getElementById('geojsonInput').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const isKML = /\.kml$/i.test(file.name);
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const gj = isKML ? kmlToGeoJSON(ev.target.result) : JSON.parse(ev.target.result);
      if(gj.features.length === 0) throw new Error('No usable features found in file.');
      if(roadLayer) map.removeLayer(roadLayer);
      roadLayer = L.geoJSON(gj, {
        renderer: L.canvas({padding: 0.5}),
        style: f => ({color: (f.properties && f.properties.Road_Class==='07') ? '#5a6b60' : '#e0a458', weight: 2, opacity: 0.85})
      }).addTo(map);
      map.fitBounds(roadLayer.getBounds());
    }catch(err){ alert('Could not parse file: '+err.message); }
  };
  reader.readAsText(file);
});

// ---- local equirectangular meter conversion (accurate for short distances) ----
function mPerDegLat(){ return 111320; }
function mPerDegLng(lat){ return 111320 * Math.cos(lat * Math.PI/180); }
function llToXY(latlng, originLat){ return {x: latlng.lng * mPerDegLng(originLat), y: latlng.lat * mPerDegLat()}; }
function xyToLL(x, y, originLat){ return L.latLng(y / mPerDegLat(), x / mPerDegLng(originLat)); }

// true spherical Web Mercator (EPSG:3857) -- needed for an accurate WMS BBOX, distinct from
// the local equirectangular approximation above (which is only valid for short on-map distances).
const MERC_R = 6378137;
function lngToMercX(lng){ return lng * Math.PI/180 * MERC_R; }
function latToMercY(lat){ return Math.log(Math.tan(Math.PI/4 + lat*Math.PI/360)) * MERC_R; }

function findNearestRoadPoint(clickLatLng){
  if(!roadLayer) return null;
  const originLat = clickLatLng.lat;
  const click = llToXY(clickLatLng, originLat);
  let best = null;
  roadLayer.eachLayer(layer=>{
    let latlngsArr = layer.getLatLngs ? layer.getLatLngs() : null;
    if(!latlngsArr) return;
    let lines = Array.isArray(latlngsArr[0]) ? latlngsArr : [latlngsArr];
    lines.forEach(line=>{
      for(let i=0;i<line.length-1;i++){
        const a = llToXY(line[i], originLat), b = llToXY(line[i+1], originLat);
        const dx=b.x-a.x, dy=b.y-a.y, len2=dx*dx+dy*dy;
        if(len2===0) continue;
        let t = ((click.x-a.x)*dx + (click.y-a.y)*dy) / len2;
        t = Math.max(0, Math.min(1, t));
        const px=a.x+t*dx, py=a.y+t*dy, d=Math.hypot(click.x-px, click.y-py);
        if(!best || d<best.dist){ const tlen=Math.hypot(dx,dy); best = {dist:d, x:px, y:py, tx:dx/tlen, ty:dy/tlen, props: layer.feature?layer.feature.properties:{}}; }
      }
    });
  });
  if(!best) return null;
  return {dist: best.dist, point: xyToLL(best.x, best.y, originLat), tangent:{tx:best.tx, ty:best.ty}, originLat, props: best.props};
}

function nearestPointOnRoads(clickLatLng, maxSnapM){
  const best = findNearestRoadPoint(clickLatLng);
  if(!best || best.dist > maxSnapM) return null;
  return best;
}

// ---- point-code cross-section: 4 independently draggable markers, live-redrawn dimension line ----
const PC_LABELS = ['Building edge A','Footpath edge A','Footpath edge B','Building edge B'];
const PC_COLORS = ['#e0a458','#5fbf8a','#5fbf8a','#e0a458'];
const pcRegistry = {}; // pointCode -> {positions:[LatLng x4], markers:[], group, roadName}
let pointCodeList = []; // [{code, latlng, status:'pending'|'done', properties}]
const imageMeta = {}; // pointCode -> {rawFilename, annotatedFilename, capturedAt}

const PC_CODE_KEYS = ['point_code','Point_Code','PointCode','pointcode','code','Code','ID','id','S_Code','SCode','name'];

function extractPcCode(props, fallbackIndex){
  for(const key of PC_CODE_KEYS){
    if(props && props[key] !== undefined && String(props[key]).trim() !== '') return String(props[key]).trim();
  }
  return 'PC-' + (fallbackIndex+1);
}

document.getElementById('pcListInput').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const isKML = /\.kml$/i.test(file.name);
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const gj = isKML ? kmlToGeoJSON(ev.target.result) : JSON.parse(ev.target.result);
      const points = gj.features.filter(f=>f.geometry && f.geometry.type==='Point');
      if(points.length===0) throw new Error('No Point features found in this file.');
      pointCodeList = points.map((f,i)=>({
        code: extractPcCode(f.properties, i),
        latlng: L.latLng(f.geometry.coordinates[1], f.geometry.coordinates[0]),
        status: pcRegistry[extractPcCode(f.properties, i)] ? 'done' : 'pending',
        properties: f.properties || {}
      }));
      renderPcList();
      document.getElementById('pcListContainer').style.display = 'block';
      if(pointCodeList.length){
        const bounds = L.latLngBounds(pointCodeList.map(p=>p.latlng));
        map.fitBounds(bounds, {maxZoom:18});
      }
    }catch(err){ alert('Could not parse point code file: '+err.message); }
  };
  reader.readAsText(file);
});

function updateSearchDatalist(){
  const dl = document.getElementById('pcCodeOptions');
  const codes = new Set([...Object.keys(pcRegistry), ...pointCodeList.map(p=>p.code)]);
  dl.innerHTML = [...codes].sort().map(c=>`<option value="${c.replace(/"/g,'&quot;')}">`).join('');
}

function flashPc(code){
  const pc = pcRegistry[code];
  if(!pc) return;
  let n = 0;
  const iv = setInterval(()=>{
    pc.visualLayer.eachLayer(l=>{ if(l.setStyle) l.setStyle({opacity: n%2===0 ? 0.15 : 0.95}); });
    n++;
    if(n>5){ clearInterval(iv); redrawPc(code); }
  }, 180);
}

function searchGo(){
  const raw = document.getElementById('searchInput').value.trim();
  if(!raw) return;
  const lower = raw.toLowerCase();

  // exact match in generated point codes first
  let code = Object.keys(pcRegistry).find(c=>c.toLowerCase()===lower);
  if(!code) code = Object.keys(pcRegistry).find(c=>c.toLowerCase().includes(lower));
  if(code){
    map.setView(pcRegistry[code].center, Math.max(map.getZoom(), 20));
    flashPc(code);
    return;
  }

  // fall back to the uploaded point-code list (not yet generated)
  let entry = pointCodeList.find(p=>p.code.toLowerCase()===lower);
  if(!entry) entry = pointCodeList.find(p=>p.code.toLowerCase().includes(lower));
  if(entry){
    map.setView(entry.latlng, Math.max(map.getZoom(), 19));
    alert(`"${entry.code}" is in your point code list but hasn't been generated yet. Click it in the list, or click "Generate" here, to create its scale.`);
    return;
  }

  alert(`No point code matching "${raw}" found (checked both generated point codes and the uploaded list).`);
}

function renderPcList(){
  const container = document.getElementById('pcList');
  container.innerHTML = '';
  updateSearchDatalist();
  pointCodeList.forEach((entry, idx)=>{
    const div = document.createElement('div');
    div.className = 'pc-list-item' + (entry.status==='done' ? ' done' : '');
    div.innerHTML = `<span class="dot" style="background:${entry.status==='done' ? '#5fbf8a' : '#e0a458'};"></span>`+
      `<span class="code">${entry.code}</span>`+
      `<span style="font-size:10px;color:var(--ink-dim);">${entry.status==='done' ? '✓' : '→'}</span>`;
    div.onclick = ()=>generateFromList(idx);
    container.appendChild(div);
  });
  const done = pointCodeList.filter(p=>p.status==='done').length;
  document.getElementById('pcListStatus').textContent = `${done}/${pointCodeList.length}`;
}

function generateFromList(idx){
  const entry = pointCodeList[idx];
  if(!roadLayer){
    alert('Upload a road network first (GeoJSON or KML) — the guide needs a road line to orient perpendicular to.');
    return;
  }
  if(entry.status==='done' && !confirm(`"${entry.code}" was already generated. Regenerate it at its file coordinate? This overwrites any manual adjustments made to it.`)) return;

  map.setView(entry.latlng, Math.max(map.getZoom(), 19));
  const result = createPointCodeAt(entry.code, entry.latlng);
  if(!result.ok){
    const msg = result.distance === null
      ? `"${entry.code}": no road features found in the loaded network at all.`
      : `"${entry.code}": nearest road is ${result.distance.toFixed(0)}m away, beyond the ${ROAD_SNAP_THRESHOLD_M}m snap limit. You can still place it manually on the map instead.`;
    alert(msg);
    return;
  }
  entry.status = 'done';
  renderPcList();
  disarmAddMode();
  document.getElementById('pcHint').textContent = `"${entry.code}" placed from the point code list, snapped perpendicular to the nearest road. Drag any tick to fine-tune.`;
}


const records = [];

function makePcIcon(color, angleDeg, width){
  width = width || 4;
  const half = width/2;
  return L.divIcon({
    className:'',
    html:`<div style="position:relative;width:26px;height:26px;">
      <div class="pc-tick-hit"></div>
      <div class="pc-tick-bar" style="background:${color};width:${width}px;margin-left:-${half}px;transform:rotate(${angleDeg}deg);"></div>
    </div>`,
    iconSize:[26,26], iconAnchor:[13,13]
  });
}

// angle (CSS degrees) to rotate a vertical bar so it ends up perpendicular to the A->B axis,
// matching how the axis actually looks on screen (equirect meters are locally angle-accurate
// here since Web Mercator is conformal at this scale).
function axisAngleDeg(posA, posB){
  const originLat = posA.lat;
  const a = llToXY(posA, originLat), b = llToXY(posB, originLat);
  const meterAngle = Math.atan2(b.y-a.y, b.x-a.x);
  return -meterAngle * 180/Math.PI;
}

function updateTickAngles(code){
  const pc = pcRegistry[code];
  const angle = axisAngleDeg(pc.positions[0], pc.positions[3]);
  pc.markers.forEach(m=>{
    const el = m.getElement();
    if(!el) return;
    const bar = el.querySelector('.pc-tick-bar');
    if(bar) bar.style.transform = `rotate(${angle}deg)`;
  });
}

function drawHaloLine(points, group, weight){
  L.polyline(points, {color:'#000', weight: weight+2.5, opacity:0.4}).addTo(group);
  L.polyline(points, {color:'#fff', weight: weight, opacity:0.95}).addTo(group);
}
function midpoint(a,b){ return L.latLng((a.lat+b.lat)/2, (a.lng+b.lng)/2); }

// redraws only the halo lines/ticks/labels -- never touches pc.markerLayer, so an in-progress
// drag on one of the 4 markers is never interrupted by a redraw triggered by that same drag.
function redrawPc(code){
  const pc = pcRegistry[code];
  pc.visualLayer.clearLayers();
  const [pA,pFA,pFB,pB] = pc.positions;
  drawHaloLine(pc.positions, pc.visualLayer, 2.2);

  const fA = pA.distanceTo(pFA), cw = pFA.distanceTo(pFB), fB = pFB.distanceTo(pB), row = pA.distanceTo(pB);
  const labels = [[midpoint(pA,pFA), `Ft A · ${fA.toFixed(1)}m`], [midpoint(pFA,pFB), `Carriageway · ${cw.toFixed(1)}m`], [midpoint(pFB,pB), `Ft B · ${fB.toFixed(1)}m`]];
  labels.forEach(([pos,text])=>{
    L.circleMarker(pos, {radius:0, opacity:0, fillOpacity:0}).addTo(pc.visualLayer)
      .bindTooltip(text, {permanent:true, direction:'top', offset:[0,-4], className:'dim-label'});
  });
  L.circleMarker(midpoint(pFA,pFB), {radius:5, color:'#e0453a', fillColor:'#e0453a', fillOpacity:1, weight:2}).addTo(pc.visualLayer)
    .bindTooltip(code, {permanent:true, direction:'bottom', offset:[0,10], className:'pc-label'});

  return {footpathA_m:fA, carriageway_m:cw, footpathB_m:fB, row_total_m:row};
}

function sanitizeKey(code){ return code.replace(/[\s\/\\'"]/g, '_').slice(0,150); }

async function savePc(code){
  const pc = pcRegistry[code];
  const m = redrawPc(code);
  const rec = {pointCode: code, roadName: pc.roadName || '', ...m, latlngs: pc.positions.map(p=>({lat:p.lat,lng:p.lng})), savedAt: new Date().toISOString(), locked: !!pc.locked};
  const existing = records.findIndex(r=>r.pointCode===code);
  if(existing>-1) records[existing]=rec; else records.push(rec);
  renderLog();
  try{
    await window.storage.set('xsec:'+sanitizeKey(code), JSON.stringify(rec), false);
    await refreshSavedCount();
  }catch(err){ console.error('save failed', code, err); }
}

// live visual + list-number update while dragging -- does NOT write to storage. Nothing is
// actually persisted until the explicit Save/Lock action is clicked (savePc above).
function refreshRecordDisplay(code){
  const pc = pcRegistry[code];
  const m = redrawPc(code);
  const rec = {pointCode: code, roadName: pc.roadName || '', ...m, latlngs: pc.positions.map(p=>({lat:p.lat,lng:p.lng})), savedAt: (records.find(r=>r.pointCode===code)||{}).savedAt, locked: !!pc.locked};
  const existing = records.findIndex(r=>r.pointCode===code);
  if(existing>-1) records[existing]=rec; else records.push(rec);
  renderLog();
}

// axis-based position model: pc.center + pc.dir (unit vector) + pc.offsets (signed meters
// along dir) define all 4 tick positions. Only the rotate handle changes pc.dir; dragging any
// of the 4 ticks only changes its own offset, sliding along the current line -- never off it.
function syncPositionsFromAxis(pc){
  const originLat = pc.center.lat;
  const c = llToXY(pc.center, originLat);
  pc.positions = pc.offsets.map(o => xyToLL(c.x + pc.dir.x*o, c.y + pc.dir.y*o, originLat));
}

// reconstructs the axis model from 4 saved lat/lngs (used when loading older/saved data) --
// also has the side effect of auto-straightening anything saved before axis-locking existed.
function reconstructAxisFromPositions(positions){
  const pA = positions[0], pB = positions[3];
  const center = midpoint(pA, pB);
  const originLat = center.lat;
  const c = llToXY(center, originLat);
  const a = llToXY(pA, originLat), b = llToXY(pB, originLat);
  const dx = b.x-a.x, dy = b.y-a.y, len = Math.hypot(dx,dy) || 1;
  const dir = {x: dx/len, y: dy/len};
  const offsets = positions.map(p=>{
    const pxy = llToXY(p, originLat);
    return (pxy.x-c.x)*dir.x + (pxy.y-c.y)*dir.y;
  });
  return {center, dir, offsets};
}

function makeRotateIcon(){
  return L.divIcon({
    className:'',
    html:`<div class="pc-rotate-hit">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0a0e0b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 1 1-3.5-7.1"/><polyline points="21 3 21 9 15 9"/>
      </svg>
    </div>`,
    iconSize:[26,26], iconAnchor:[13,13]
  });
}

const ROTATE_EXT_M = 4; // how far past the end of the line the rotate handle sits

function tangentOf(pc){ return {x:-pc.dir.y, y:pc.dir.x}; } // perpendicular to dir = along the road

function rotateHandlePos(pc){
  const originLat = pc.center.lat;
  const c = llToXY(pc.center, originLat);
  const maxOffset = Math.max(...pc.offsets);
  const extended = maxOffset + ROTATE_EXT_M;
  return xyToLL(c.x + pc.dir.x*extended, c.y + pc.dir.y*extended, originLat);
}

function createRotateHandle(code){
  const pc = pcRegistry[code];
  const handle = L.marker(rotateHandlePos(pc), {icon: makeRotateIcon(), draggable:true, bubblingMouseEvents:false})
    .addTo(pc.markerLayer)
    .bindTooltip('Drag to rotate the scale', {direction:'top', offset:[0,-10]});

  // the handle sits ON the axis extension now, so its direction from center IS the new axis
  // direction directly -- no perpendicular conversion needed.
  function applyRotation(mouseLatLng){
    const originLat = pc.center.lat;
    const c = llToXY(pc.center, originLat);
    const m = llToXY(mouseLatLng, originLat);
    const vx = m.x-c.x, vy = m.y-c.y;
    const len = Math.hypot(vx,vy);
    if(len < 0.05) return; // ignore near-zero drags (avoid divide-by-zero jitter)
    pc.dir = {x: vx/len, y: vy/len};
    syncPositionsFromAxis(pc);
    handle.setLatLng(rotateHandlePos(pc));
    pc.markers.forEach((mk,i)=>mk.setLatLng(pc.positions[i]));
    refreshRecordDisplay(code); updateTickAngles(code);
  }
  handle.on('drag', e=>applyRotation(e.target.getLatLng()));
  handle.on('dragend', e=>applyRotation(e.target.getLatLng()));
  pc.rotateHandle = handle;
}

function makeActionIcon(locked){
  return L.divIcon({
    className:'',
    html:`<div class="pc-action-hit">${locked ? '✏️' : '💾'}</div>`,
    iconSize:[26,26], iconAnchor:[13,13]
  });
}

function actionIconPos(pc){
  const originLat = pc.center.lat;
  const c = llToXY(pc.center, originLat);
  const t = tangentOf(pc);
  return xyToLL(c.x + t.x*5, c.y + t.y*5, originLat);
}

function createActionIcon(code){
  const pc = pcRegistry[code];
  const icon = L.marker(actionIconPos(pc), {icon: makeActionIcon(pc.locked), draggable:false, bubblingMouseEvents:false})
    .addTo(pc.actionLayer)
    .bindTooltip(pc.locked ? 'Click to edit' : 'Click to save & lock', {direction:'top', offset:[0,-10]});
  icon.on('click', ()=>toggleLock(code));
  pc.actionIcon = icon;
}

function updateActionIcon(code){
  const pc = pcRegistry[code];
  if(!pc.actionIcon) return;
  pc.actionIcon.setIcon(makeActionIcon(pc.locked));
  pc.actionIcon.setTooltipContent(pc.locked ? 'Click to edit' : 'Click to save & lock');
}

// the one deliberate "commit" action: locking persists the current adjustment and hides the
// drag handles so nothing gets bumped by accident; editing un-hides them for further adjustment.
async function toggleLock(code){
  const pc = pcRegistry[code];
  if(pc.locked){
    pc.locked = false;
    if(!map.hasLayer(pc.markerLayer)) pc.markerLayer.addTo(map);
    updateActionIcon(code);
    renderLog();
  } else {
    pc.locked = true;
    savePc(code);
    map.removeLayer(pc.markerLayer);
    updateActionIcon(code);
    renderLog();

    const statusEl = document.getElementById('captureAllStatus');
    const btn = document.getElementById('savebtn-'+sanitizeKey(code));
    if(btn){ btn.disabled = true; btn.textContent = 'Saving…'; }
    if(statusEl) statusEl.textContent = `Syncing "${code}" to the sheet and capturing its drone image…`;

    await syncPointCodeToSheet(code);
    await captureDroneImage(code); // captures + uploads to Drive + writes links into the sheet row

    if(statusEl) statusEl.textContent = `"${code}" saved: row synced, image captured and uploaded.`;
    renderLog(); // resets the button out of its "Saving…" state, and shows the "✓ images saved" tag
    armAddMode();
  }
}

function createPcMarkers(code){
  const pc = pcRegistry[code];
  const angle = axisAngleDeg(pc.positions[0], pc.positions[3]);
  pc.markers = pc.positions.map((pos,i)=>{
    const tickWidth = (i===0 || i===3) ? 8 : 4; // building edges are twice as wide as footpath edges
    const marker = L.marker(pos, {icon: makePcIcon(PC_COLORS[i], angle, tickWidth), draggable:true, bubblingMouseEvents:false})
      .addTo(pc.markerLayer)
      .bindTooltip(PC_LABELS[i], {direction:'top', offset:[0,-8]});

    // every tick (building edge or footpath edge) only slides its own offset along the fixed
    // axis -- none of them can rotate or bend the line anymore. Rotation is the handle's job.
    const MIN_GAP_M = 0.1; // keeps segments from collapsing to exactly zero
    function applyOffset(mouseLatLng){
      const originLat = pc.center.lat;
      const c = llToXY(pc.center, originLat);
      const m = llToXY(mouseLatLng, originLat);
      let offset = (m.x-c.x)*pc.dir.x + (m.y-c.y)*pc.dir.y;

      // each tick is clamped against its immediate neighbor(s) so building edges can never
      // cross past their own footpath edge, and footpath edges can't cross each other or
      // their building edge -- order along the line must always stay A, Ft-A, Ft-B, B.
      if(i===0) offset = Math.min(offset, pc.offsets[1]-MIN_GAP_M);
      else if(i===1) offset = Math.max(pc.offsets[0]+MIN_GAP_M, Math.min(offset, pc.offsets[2]-MIN_GAP_M));
      else if(i===2) offset = Math.max(pc.offsets[1]+MIN_GAP_M, Math.min(offset, pc.offsets[3]-MIN_GAP_M));
      else if(i===3) offset = Math.max(offset, pc.offsets[2]+MIN_GAP_M);

      pc.offsets[i] = offset;
      syncPositionsFromAxis(pc);
      marker.setLatLng(pc.positions[i]);
      refreshRecordDisplay(code);
    }
    marker.on('drag', e=>applyOffset(e.target.getLatLng()));
    marker.on('dragend', e=>applyOffset(e.target.getLatLng()));
    return marker;
  });
}

const ROAD_SNAP_THRESHOLD_M = 200; // how far a click/point can be from a loaded road and still snap

// core creation logic, shared by manual map-click entry and by the point-code list.
// returns {ok, distance} -- distance is the nearest road found even on failure, for diagnostics.
function createPointCodeAt(code, clickLatLng){
  const nearest = findNearestRoadPoint(clickLatLng);
  if(!nearest) return {ok:false, distance:null};
  if(nearest.dist > ROAD_SNAP_THRESHOLD_M) return {ok:false, distance:nearest.dist};
  const snap = nearest;

  const totalLen = parseFloat(document.getElementById('guideLen').value) || 30;
  const halfLen = totalLen/2;
  const footpathGuess = Math.min(1.8, halfLen*0.3);

  const center = snap.point;
  const dir = {x:-snap.tangent.ty, y:snap.tangent.tx}; // perpendicular to the snapped road's tangent, always
  const offsets = [-halfLen, -(halfLen-footpathGuess), (halfLen-footpathGuess), halfLen];

  if(pcRegistry[code]) map.removeLayer(pcRegistry[code].group);

  const group = L.layerGroup().addTo(map);
  const visualLayer = L.layerGroup().addTo(group);
  const markerLayer = L.layerGroup().addTo(group);
  const actionLayer = L.layerGroup().addTo(group);
  pcRegistry[code] = {center, dir, offsets, group, visualLayer, markerLayer, actionLayer, locked:false, roadName: snap.props ? (snap.props.Road_CentrelineName||snap.props.name||'') : ''};
  syncPositionsFromAxis(pcRegistry[code]);
  createPcMarkers(code);
  createRotateHandle(code);
  createActionIcon(code);
  savePc(code);
  return {ok:true, distance:nearest.dist};
}

function addPointCode(clickLatLng){
  if(!roadLayer){
    alert('Upload a road network first (GeoJSON or KML) — the guide needs a road line to orient perpendicular to.');
    return;
  }

  // if a point-code list is loaded, clicking near a pending code uses it automatically
  const NEARBY_M = 20;
  let matched = null;
  for(const entry of pointCodeList){
    if(entry.status !== 'pending') continue;
    if(clickLatLng.distanceTo(entry.latlng) <= NEARBY_M){ matched = entry; break; }
  }

  let code;
  let targetLatLng = clickLatLng;
  if(matched){
    code = matched.code;
    targetLatLng = matched.latlng; // use the file's coordinate, not the imprecise click
  } else {
    code = prompt('Point code for this location:', '');
    if(code === null) return;
    code = code.trim() || ('PC-' + Date.now().toString(36).toUpperCase());
    if(pcRegistry[code] && !confirm(`"${code}" already exists on this map. Overwrite it at this new location?`)) return;
  }

  const result = createPointCodeAt(code, targetLatLng);
  if(!result.ok){
    const msg = result.distance === null
      ? 'No road features found in the loaded network at all — check the file actually contains road geometry.'
      : `The nearest road is ${result.distance.toFixed(0)}m away, beyond the ${ROAD_SNAP_THRESHOLD_M}m snap limit. Click closer to a road line from your loaded network, or check that network covers this area.`;
    alert(msg);
    return;
  }
  if(matched){ matched.status = 'done'; renderPcList(); }
  disarmAddMode();

  document.getElementById('pcHint').textContent = `"${code}" placed, snapped perpendicular to the nearest road${pcRegistry[code].roadName ? ' ('+pcRegistry[code].roadName+')' : ''}. Drag any tick to fine-tune.`;
}

let addMode = false;
function toggleMode(){
  addMode = !addMode;
  document.getElementById('mode-pc').classList.toggle('active', addMode);
  document.getElementById('mode-pc').textContent = addMode ? 'Click the map to place…' : 'Add point code';
}
function disarmAddMode(){
  if(!addMode) return;
  addMode = false;
  document.getElementById('mode-pc').classList.remove('active');
  document.getElementById('mode-pc').textContent = 'Add point code';
}
function armAddMode(){
  addMode = true;
  document.getElementById('mode-pc').classList.add('active');
  document.getElementById('mode-pc').textContent = 'Click the map to place…';
}
map.on('click', e=>{

});

async function deleteRecord(code){
  if(!confirm(`Delete point code "${code}"?`)) return;
  const idx = records.findIndex(r=>r.pointCode===code);
  if(idx>-1) records.splice(idx,1);
  if(pcRegistry[code]){ map.removeLayer(pcRegistry[code].group); delete pcRegistry[code]; }
  delete imageMeta[code];
  try{ await window.storage.delete('xsec:'+sanitizeKey(code), false); }catch(err){}
  try{ await window.storage.delete('imgmeta:'+sanitizeKey(code), false); }catch(err){}
  renderLog();
  await refreshSavedCount();
}

async function refreshSavedCount(){
  try{
    const listing = await window.storage.list('xsec:', false);
    document.getElementById('savedCount').textContent = listing && listing.keys ? listing.keys.length : 0;
  }catch(err){}
}

async function clearAllSaved(){
  if(!confirm('Delete ALL saved point codes and captured image records? This cannot be undone.')) return;
  try{
    const listing = await window.storage.list('xsec:', false);
    if(listing && listing.keys){ for(const key of listing.keys){ await window.storage.delete(key, false); } }
  }catch(err){}
  try{
    const listing2 = await window.storage.list('imgmeta:', false);
    if(listing2 && listing2.keys){ for(const key of listing2.keys){ await window.storage.delete(key, false); } }
  }catch(err){}
  Object.keys(pcRegistry).forEach(code=>map.removeLayer(pcRegistry[code].group));
  Object.keys(pcRegistry).forEach(code=>delete pcRegistry[code]);
  Object.keys(imageMeta).forEach(code=>delete imageMeta[code]);
  records.length = 0;
  renderLog();
  await refreshSavedCount();
}

async function loadSaved(){
  try{
    const listing = await window.storage.list('xsec:', false);
    if(!listing || !listing.keys) return;
    for(const key of listing.keys){
      try{
        const res = await window.storage.get(key, false);
        if(!res) continue;
        const d = JSON.parse(res.value);
        const positions = d.latlngs.map(p=>L.latLng(p.lat,p.lng));
        const axis = reconstructAxisFromPositions(positions); // also auto-straightens any pre-fix bent saves
        const dimLayer = L.layerGroup().addTo(map);
        const visualLayer = L.layerGroup().addTo(dimLayer);
        const markerLayer = L.layerGroup().addTo(dimLayer);
        const actionLayer = L.layerGroup().addTo(dimLayer);
        pcRegistry[d.pointCode] = {center:axis.center, dir:axis.dir, offsets:axis.offsets, group: dimLayer, visualLayer, markerLayer, actionLayer, locked: !!d.locked, roadName: d.roadName||''};
        syncPositionsFromAxis(pcRegistry[d.pointCode]);
        createPcMarkers(d.pointCode);
        createRotateHandle(d.pointCode);
        createActionIcon(d.pointCode);
        if(pcRegistry[d.pointCode].locked) map.removeLayer(markerLayer);
        redrawPc(d.pointCode);
        records.push({pointCode:d.pointCode, roadName:d.roadName||'', footpathA_m:d.footpathA_m, carriageway_m:d.carriageway_m, footpathB_m:d.footpathB_m, row_total_m:d.row_total_m, latlngs:d.latlngs, savedAt:d.savedAt, locked: !!d.locked});
      }catch(err){ console.error('load fail', key, err); }
    }
    try{
      const imgListing = await window.storage.list('imgmeta:', false);
      if(imgListing && imgListing.keys){
        for(const key of imgListing.keys){
          try{
            const res = await window.storage.get(key, false);
            if(!res) continue;
            const d = JSON.parse(res.value);
            // key is 'imgmeta:'+sanitizedCode -- find the matching real point code from records
            const match = records.find(r=>sanitizeKey(r.pointCode) === key.slice('imgmeta:'.length));
            if(match) imageMeta[match.pointCode] = d;
          }catch(err){ console.error('imgmeta load fail', key, err); }
        }
      }
    }catch(err){}
    renderLog();
    await refreshSavedCount();
  }catch(err){}
}
loadSaved();

// ---- training image capture ----
const CAPTURE_ZOOM = 19; // matches maxNativeZoom on OSM/Esri, avoids upscale blur

function waitMs(ms){ return new Promise(res=>setTimeout(res, ms)); }

function bufferPixelRect(center, bufferM){
  const originLat = center.lat;
  const c = llToXY(center, originLat);
  const nw = xyToLL(c.x-bufferM, c.y+bufferM, originLat);
  const se = xyToLL(c.x+bufferM, c.y-bufferM, originLat);
  const p1 = map.latLngToContainerPoint(nw);
  const p2 = map.latLngToContainerPoint(se);
  return {
    x: Math.round(Math.min(p1.x,p2.x)), y: Math.round(Math.min(p1.y,p2.y)),
    width: Math.round(Math.abs(p2.x-p1.x)), height: Math.round(Math.abs(p2.y-p1.y))
  };
}

function downloadCanvasPng(canvas, filename){
  return new Promise(resolve=>{
    canvas.toBlob(blob=>{
      if(!blob){ resolve(false); return; }
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      resolve(true);
    }, 'image/png');
  });
}

// requests the drone/BBMP WMS layer directly at its own native resolution (~3-4cm/px per
// the RDGIS technical note), instead of screenshotting Leaflet's on-screen tile pyramid.
// Falls back to opening the image in a new tab (always works, no download automation) if the
// server doesn't send CORS headers permitting pixel extraction.
function buildDroneImageUrl(center, bufferM, pxSize){
  const latRad = center.lat * Math.PI/180;
  const bufferMerc = bufferM / Math.cos(latRad); // ground meters -> Web Mercator projected meters
  const half = bufferMerc/2;
  const cx = lngToMercX(center.lng), cy = latToMercY(center.lat);
  const bbox = [cx-half, cy-half, cx+half, cy+half].join(',');
  const params = new URLSearchParams({
    SERVICE:'WMS', VERSION:'1.1.1', REQUEST:'GetMap',
    LAYERS: WMS_LAYER, STYLES:'', FORMAT:'image/png', TRANSPARENT:'false',
    WIDTH:pxSize, HEIGHT:pxSize, SRS:'EPSG:3857', BBOX:bbox
  });
  return `${WMS_URL}?${params.toString()}`;
}

// draws the same halo dimension line/ticks/labels used on-map, but directly onto a plain
// canvas using the image's own pixel geometry -- independent of Leaflet's current zoom/pan.
function drawDimensionOnCanvas(ctx, pc, center, bufferM, pxW, pxH){
  const originLat = center.lat;
  const pxPerM = pxW / bufferM;
  const toPx = (latlng)=>{
    const dx = (latlng.lng-center.lng) * mPerDegLng(originLat);
    const dy = (latlng.lat-center.lat) * mPerDegLat();
    return {x: pxW/2 + dx*pxPerM, y: pxH/2 - dy*pxPerM};
  };
  const pts = pc.positions.map(toPx);

  function haloLine(p1,p2,w){
    ctx.lineCap = 'round';
    ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = w+3;
    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = w;
    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
  }
  for(let i=0;i<3;i++) haloLine(pts[i], pts[i+1], 2.5);

  const axisDx = pts[3].x-pts[0].x, axisDy = pts[3].y-pts[0].y;
  const axisLen = Math.hypot(axisDx,axisDy) || 1;
  const perp = {x:-axisDy/axisLen, y:axisDx/axisLen};
  pts.forEach(p=>haloLine({x:p.x+perp.x*7,y:p.y+perp.y*7}, {x:p.x-perp.x*7,y:p.y-perp.y*7}, 2.5));

  function label(p1,p2,text){
    const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2-8;
    ctx.font = 'bold 14px Segoe UI, sans-serif';
    ctx.textAlign = 'center';
    ctx.lineWidth = 3; ctx.strokeStyle = '#000'; ctx.strokeText(text, mx, my);
    ctx.fillStyle = '#fff'; ctx.fillText(text, mx, my);
  }
  label(pts[0],pts[1], `Ft A · ${(pc.offsets[1]-pc.offsets[0]).toFixed(1)}m`);
  label(pts[1],pts[2], `Carriageway · ${(pc.offsets[2]-pc.offsets[1]).toFixed(1)}m`);
  label(pts[2],pts[3], `Ft B · ${(pc.offsets[3]-pc.offsets[2]).toFixed(1)}m`);

  const dot = {x:(pts[1].x+pts[2].x)/2, y:(pts[1].y+pts[2].y)/2};
  ctx.beginPath(); ctx.arc(dot.x,dot.y,6,0,2*Math.PI);
  ctx.fillStyle = '#e0453a'; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#000'; ctx.stroke();
}

async function captureDroneImage(code){
  const pc = pcRegistry[code];
  if(!pc){ alert('Point code not found.'); return; }

  const bufferM = parseFloat(document.getElementById('imgBuffer').value) || 15;
  const NATIVE_MPP = 0.037; // per the RDGIS technical note's documented resolution
  const pxSize = Math.min(2048, Math.max(256, Math.round(bufferM/NATIVE_MPP)));
  const url = buildDroneImageUrl(pc.center, bufferM, pxSize);

  const btn = document.getElementById('dronebtn-'+sanitizeKey(code));
  if(btn){ btn.textContent = 'Loading…'; btn.disabled = true; }

  try{
    const img = await new Promise((resolve,reject)=>{
      const im = new Image();
      im.crossOrigin = 'anonymous';
      im.onload = ()=>resolve(im);
      im.onerror = ()=>reject(new Error('image request failed'));
      im.src = url;
    });

    const rawCanvas = document.createElement('canvas');
    rawCanvas.width = img.width; rawCanvas.height = img.height;
    rawCanvas.getContext('2d').drawImage(img,0,0);
    const rawName = `${sanitizeKey(code)}_drone_raw.png`;
    await downloadCanvasPng(rawCanvas, rawName);
    uploadImageToDrive(rawCanvas, rawName, code, 'map_image');

    const annCanvas = document.createElement('canvas');
    annCanvas.width = img.width; annCanvas.height = img.height;
    const actx = annCanvas.getContext('2d');
    actx.drawImage(img,0,0);
    drawDimensionOnCanvas(actx, pc, pc.center, bufferM, img.width, img.height);
    const annName = `${sanitizeKey(code)}_drone_annotated.png`;
    await downloadCanvasPng(annCanvas, annName);
    uploadImageToDrive(annCanvas, annName, code, 'annotated_image');

    imageMeta[code] = {rawFilename: rawName, annotatedFilename: annName, capturedAt: new Date().toISOString(), source:'drone_wms'};
    try{ await window.storage.set('imgmeta:'+sanitizeKey(code), JSON.stringify(imageMeta[code]), false); }catch(err){ console.error('imgmeta save failed', err); }
    renderLog();
    alert(`Captured native-resolution drone imagery for "${code}" (${img.width}×${img.height}px):\n${rawName}\n${annName}`);
  }catch(err){
    console.error('drone capture failed', code, err);
    if(confirm(`Could not export this directly — the server likely doesn't allow cross-origin pixel access (this is a server-side setting, not something fixable from here). Open the image in a new tab instead, so you can save it yourself with a right-click?`)){
      window.open(url, '_blank');
    }
  } finally {
    if(btn){ btn.textContent = '🛰️ Drone image'; btn.disabled = false; }
  }
}

// runs captureCode/captureDroneImage across every saved point code, one at a time, so a single
// click by the person works through the whole list -- still their click, just automated after that.
async function captureAll(kind){
  const codes = Object.keys(pcRegistry);
  if(codes.length===0){ alert('No point codes saved yet.'); return; }
  const statusEl = document.getElementById('captureAllStatus');
  const fn = kind==='drone' ? captureDroneImage : captureCode;

  for(let i=0;i<codes.length;i++){
    statusEl.textContent = `Capturing ${codes[i]} (${i+1}/${codes.length})…`;
    try{ await fn(codes[i]); }
    catch(err){ console.error('batch capture failed for', codes[i], err); }
    await waitMs(400); // brief gap between codes so downloads/uploads don't overlap
  }
  statusEl.textContent = `Done — worked through ${codes.length} point code(s). Check the downloads folder (and Drive, if configured) to confirm nothing came out blank.`;
}

async function captureCode(code){
  const pc = pcRegistry[code];
  if(!pc){ alert('Point code not found.'); return; }
  if(typeof html2canvas === 'undefined'){ alert('Screenshot library failed to load — check your connection and reload the page.'); return; }

  const bufferM = parseFloat(document.getElementById('imgBuffer').value) || 15;
  const originalCenter = map.getCenter(), originalZoom = map.getZoom();
  const btn = document.getElementById('capbtn-'+sanitizeKey(code));
  if(btn){ btn.textContent = 'Capturing…'; btn.disabled = true; }

  try{
    map.setView(pc.center, CAPTURE_ZOOM, {animate:false});
    await waitMs(1200); // let tiles finish loading at the new view

    const rect = bufferPixelRect(pc.center, bufferM);
    const mapEl = document.getElementById('map');

    // hide every point code's overlay for the clean shot
    Object.values(pcRegistry).forEach(p=>{ if(map.hasLayer(p.group)) map.removeLayer(p.group); });
    await waitMs(50);

    const canvasClean = await html2canvas(mapEl, {x:rect.x, y:rect.y, width:rect.width, height:rect.height, useCORS:true, logging:false, backgroundColor:null});
    const rawName = `${sanitizeKey(code)}_raw.png`;
    await downloadCanvasPng(canvasClean, rawName);
    uploadImageToDrive(canvasClean, rawName, code, 'map_image');

    // show only this code's dimension lines/labels (not the drag ticks/rotate handle) for the annotated shot
    pc.visualLayer.addTo(map);
    await waitMs(50);
    const canvasAnnotated = await html2canvas(mapEl, {x:rect.x, y:rect.y, width:rect.width, height:rect.height, useCORS:true, logging:false, backgroundColor:null});
    const annName = `${sanitizeKey(code)}_annotated.png`;
    await downloadCanvasPng(canvasAnnotated, annName);
    uploadImageToDrive(canvasAnnotated, annName, code, 'annotated_image');
    map.removeLayer(pc.visualLayer);

    // restore all point code overlays
    Object.values(pcRegistry).forEach(p=>{ if(!map.hasLayer(p.group)) p.group.addTo(map); });

    imageMeta[code] = {rawFilename: rawName, annotatedFilename: annName, capturedAt: new Date().toISOString()};
    try{ await window.storage.set('imgmeta:'+sanitizeKey(code), JSON.stringify(imageMeta[code]), false); }catch(err){ console.error('imgmeta save failed', err); }

    renderLog();
    alert(`Captured "${code}":\n${rawName}\n${annName}\n\nIf either image looks blank when you open it, that basemap likely blocked cross-origin export — try switching to Esri Satellite and re-capturing.`);
  } finally {
    map.setView(originalCenter, originalZoom, {animate:false});
    if(btn){ btn.textContent = '📷 Capture'; btn.disabled = false; }
  }
}

function exportExcel(){
  if(records.length===0){ alert('No point codes saved yet.'); return; }
  if(typeof XLSX === 'undefined'){ alert('Excel library failed to load — check your connection and reload the page.'); return; }

  const rows = records.map(r=>{
    const img = imageMeta[r.pointCode] || {};
    return {
      'Point Code': r.pointCode,
      'Footpath A width (m)': +r.footpathA_m.toFixed(2),
      'Carriageway width (m)': +r.carriageway_m.toFixed(2),
      'Footpath B width (m)': +r.footpathB_m.toFixed(2),
      'Total ROW (m)': +r.row_total_m.toFixed(2),
      'Road name': r.roadName || '',
      'Image 1 (no annotation)': img.rawFilename || '',
      'Image 2 (annotated)': img.annotatedFilename || '',
      'Saved at': r.savedAt || ''
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Point Codes');
  XLSX.writeFile(wb, 'point_codes.xlsx');
}

// ---- Google Sheet sync (via a small Apps Script Web App you deploy on your own sheet) ----
let sheetSyncUrl = 'https://script.google.com/macros/s/AKfycbyZBY1zjUQDiziVfF-Rxn_V8gc5n-HP83uAxLALf2TUhp-gm63g4c4B5ukyw8vsFNTB/exec';

async function loadSheetSyncUrl(){
  try{
    const res = await window.storage.get('config:sheetSyncUrl', false);
    if(res && res.value){
      sheetSyncUrl = res.value;
      document.getElementById('sheetSyncUrl').value = sheetSyncUrl;
    }
  }catch(err){ /* nothing saved yet, or storage unavailable this session */ }
}

document.getElementById('sheetSyncUrl').addEventListener('change', async e=>{
  sheetSyncUrl = e.target.value.trim();
  try{ await window.storage.set('config:sheetSyncUrl', sheetSyncUrl, false); }catch(err){ console.error('could not save sync URL', err); }
});

async function syncPointCodeToSheet(code){
  if(!sheetSyncUrl) return;
  const pc = pcRegistry[code];
  const rec = records.find(r=>r.pointCode===code);
  if(!pc || !rec) return;

  const payload = {
    point_code: code,
    latitude_longitude: `${pc.center.lat.toFixed(6)}, ${pc.center.lng.toFixed(6)}`,
    footpath_side_a: Number(rec.footpathA_m.toFixed(2)),
    carriage_way: Number(rec.carriageway_m.toFixed(2)),
    footpath_side_b: Number(rec.footpathB_m.toFixed(2)),
    row_total: Number(rec.row_total_m.toFixed(2))
  };
  try{
    // text/plain content-type avoids a CORS preflight that Apps Script Web Apps don't handle;
    // Apps Script still reads the raw body fine via e.postData.contents regardless.
    await fetch(sheetSyncUrl, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type': 'text/plain;charset=utf-8'},
      body: JSON.stringify(payload)
    });
  }catch(err){ console.error('sheet sync failed for', code, err); }
}

async function syncAllToSheet(){
  if(!sheetSyncUrl){ alert('Paste your Apps Script Web App URL first.'); return; }
  if(records.length===0){ alert('No point codes saved yet.'); return; }
  const statusEl = document.getElementById('sheetSyncStatus');
  for(let i=0;i<records.length;i++){
    statusEl.textContent = `Syncing ${records[i].pointCode} (${i+1}/${records.length})…`;
    await syncPointCodeToSheet(records[i].pointCode);
    await new Promise(r=>setTimeout(r, 250)); // stay well under Apps Script's request quota
  }
  statusEl.textContent = `Synced ${records.length} point code(s). Note: since this uses a no-cors request, the browser can't confirm success/failure per row — check the sheet directly, and re-run this if any rows look off.`;
}

// uploads a captured canvas straight to the Drive folder via the same Apps Script endpoint --
// the script writes the resulting link into map_image/annotated_image itself (see note in the
// .gs file) since this no-cors request can't read a response back here to do it client-side.
async function uploadImageToDrive(canvas, filename, pointCode, imageKind){
  if(!sheetSyncUrl) return;
  const base64 = canvas.toDataURL('image/png');
  try{
    await fetch(sheetSyncUrl, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type': 'text/plain;charset=utf-8'},
      body: JSON.stringify({type:'image', filename, base64, point_code: pointCode, image_kind: imageKind})
    });
  }catch(err){ console.error('drive upload failed for', filename, err); }
}

loadSheetSyncUrl();

function exportData(fmt){
  if(records.length===0){ alert('No point codes saved yet.'); return; }
  let content, mime, ext;
  if(fmt==='geojson'){
    const features = records.map(r=>({
      type:'Feature',
      properties:{point_code:r.pointCode, road_name:r.roadName, footpathA_m:r.footpathA_m, carriageway_m:r.carriageway_m, footpathB_m:r.footpathB_m, row_total_m:r.row_total_m, saved_at:r.savedAt||''},
      geometry:{type:'LineString', coordinates:r.latlngs.map(p=>[p.lng,p.lat])}
    }));
    content = JSON.stringify({type:'FeatureCollection', features}, null, 2);
    mime='application/geo+json'; ext='geojson';
  } else {
    const rows = ['point_code,footpathA_m,carriageway_m,footpathB_m,row_total_m,road_name,lat_buildingA,lng_buildingA,lat_buildingB,lng_buildingB'];
    records.forEach(r=>{
      const p1=r.latlngs[0], p2=r.latlngs[3];
      rows.push([`"${r.pointCode.replace(/"/g,'""')}"`, r.footpathA_m.toFixed(3), r.carriageway_m.toFixed(3), r.footpathB_m.toFixed(3), r.row_total_m.toFixed(3), `"${(r.roadName||'').replace(/"/g,'""')}"`, p1.lat, p1.lng, p2.lat, p2.lng].join(','));
    });
    content = rows.join('\n');
    mime='text/csv'; ext='csv';
  }
  const blob = new Blob([content], {type:mime});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `point_codes.${ext}`;
  a.click();
}
